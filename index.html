<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />

    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <div class="body-container">
      <main class="results-component">
        <div class="result">
          <h2 class="heading-m neutral-200 ">Your Result</h2>
          <div class="result-number">
            <h1 class="heading-xl neutral-0 ">76</h1>
            <span class="body-b">of 100</span>
          </div>
          <h3 class="heading-l neutral-0">Great</h3>
          <p class="body neutral-200">
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>

        <div class="summary">
          <h2 class="heading-m neutral-300">Summary</h2>
          <ul class="summary-list">
            <li class="summary-item">
              <img
                src="./assets/images/icon-reaction.svg"
                alt=""
                width="20"
                height="20"
              />
              Reaction
              <div class="summary-number">80 <span> /100</span></div>
            </li>
            <li class="summary-item">
              <img
                src="./assets/images/icon-memory.svg"
                alt=""
                width="20"
                height="20"
              />
              Memory
              <div class="summary-number">92 <span>/ 100</span></div>
            </li>
            <li class="summary-item">
              <img
                src="./assets/images/icon-verbal.svg"
                alt=""
                width="20"
                height="20"
              />
              Verbal
              <div class="summary-number">61 <span>/ 100</span></div>
            </li>
            <li class="summary-item">
              <img
                src="./assets/images/icon-visual.svg"
                alt=""
                width="20"
                height="20"
              />
              Visual
              <div class="summary-number">72 <span>/ 100</span></div>
            </li>
          </ul>
          <a href="#" class="button">Continue</a>
        </div>
      </main>
    </div>
  </body>
</html>
